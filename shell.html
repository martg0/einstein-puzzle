<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Einstein Puzzle</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      font-family: sans-serif;
      color: #eee;
      overflow-x: hidden;
      touch-action: none;
    }
    #container {
      text-align: center;
      padding: 10px 0 40px;
      width: 100%;
    }
    canvas.emscripten {
      border: 2px solid #444;
      background: #000;
      display: block;
      margin: 0 auto;
      transform-origin: top center;
      image-rendering: auto;
    }
    #controls {
      margin-top: 10px;
      transform-origin: top center;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      padding: 0 10px;
    }
    .ctrl-btn {
      background: #2a2a4e;
      color: #ccc;
      border: 1px solid #555;
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      border-radius: 4px;
    }
    .ctrl-btn:hover { background: #3a3a6e; color: #fff; }
    #status {
      margin-top: 12px;
      font-size: 14px;
      color: #aaa;
    }
    #progress {
      width: 300px;
      margin: 10px auto;
    }
    #mobile-hint {
      display: none;
      font-size: 12px;
      color: #777;
      margin-top: 6px;
      padding: 0 20px;
    }

    /* Desktop: scale up */
    @media (min-width: 820px) {
      canvas.emscripten { transform: scale(1.3); }
      #controls { margin-top: 200px; }
    }

    /* Mobile/tablet: fit to screen width */
    @media (max-width: 819px) {
      canvas.emscripten {
        width: 100vw;
        height: auto;
        border: none;
      }
      #container { padding: 0 0 20px; }
      #controls { margin-top: 8px; }
      #mobile-hint { display: block; }
    }
  </style>
</head>
<body>
  <div id="container">
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    <div id="mobile-hint">Tap = confirm | Long press = eliminate</div>
    <div id="controls">
      <button class="ctrl-btn" id="fullscreen-btn">Fullscreen</button>
      <button class="ctrl-btn" id="reset-btn">Reset saves</button>
    </div>
    <div id="status">Downloading...</div>
    <progress id="progress" value="0" max="100" hidden></progress>
  </div>

  <script>
    var statusElement = document.getElementById('status');
    var progressElement = document.getElementById('progress');
    var canvas = document.getElementById('canvas');

    // Fullscreen
    document.getElementById('fullscreen-btn').addEventListener('click', function() {
      var el = document.getElementById('container');
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.msRequestFullscreen) el.msRequestFullscreen();
      canvas.focus();
    });

    function onFullscreenChange() {
      var isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
      var container = document.getElementById('container');
      if (isFs) {
        var sw = screen.availWidth || window.innerWidth;
        var sh = screen.availHeight || window.innerHeight;
        // Leave small margin to avoid clipping on iPad/mobile
        var scale = Math.min(sw / 800, sh / 600) * 0.95;
        canvas.style.transform = 'scale(' + scale + ')';
        canvas.style.transformOrigin = 'center center';
        container.style.display = 'flex';
        container.style.justifyContent = 'center';
        container.style.alignItems = 'center';
        container.style.height = '100dvh';
        container.style.maxHeight = '100vh';
        container.style.background = '#000';
        container.style.overflow = 'hidden';
        document.getElementById('controls').style.display = 'none';
        document.getElementById('mobile-hint').style.display = 'none';
      } else {
        canvas.style.transform = '';
        canvas.style.transformOrigin = 'top center';
        container.style.display = '';
        container.style.justifyContent = '';
        container.style.alignItems = '';
        container.style.height = '';
        container.style.maxHeight = '';
        container.style.background = '';
        container.style.overflow = '';
        document.getElementById('controls').style.display = '';
      }
    }
    document.addEventListener('fullscreenchange', onFullscreenChange);
    document.addEventListener('webkitfullscreenchange', onFullscreenChange);

    // Reset saves
    document.getElementById('reset-btn').addEventListener('click', function() {
      if (confirm('Delete all saves, scores, and settings? This cannot be undone.')) {
        // Clear IndexedDB
        var req = indexedDB.deleteDatabase('/einstein_data');
        req.onsuccess = function() {
          alert('Saves cleared. Reloading...');
          location.reload();
        };
        req.onerror = function() {
          alert('Error clearing saves.');
        };
      }
    });

    // Prevent default touch behaviors (scroll, zoom)
    canvas.addEventListener('touchstart', function(e) { e.preventDefault(); }, { passive: false });
    canvas.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
    canvas.addEventListener('touchend', function(e) { e.preventDefault(); }, { passive: false });

    var Module = {
      canvas: canvas,
      setStatus: function(text) {
        if (!text) {
          statusElement.style.display = 'none';
          progressElement.hidden = true;
          return;
        }
        var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
        if (m) {
          progressElement.value = parseInt(m[2]) * 100 / parseInt(m[4]);
          progressElement.hidden = false;
        }
        statusElement.innerHTML = text;
      },
      totalDependencies: 0,
      monitorRunDependencies: function(left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
        Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')' : '');
      }
    };

    Module.setStatus('Downloading...');
    window.onerror = function() {
      Module.setStatus('Error - check browser console');
    };
  </script>
  {{{ SCRIPT }}}
</body>
</html>
